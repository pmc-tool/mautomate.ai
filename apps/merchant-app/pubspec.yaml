name: mautomate_merchant
description: "mAutomate — run your shop, and talk to it. Merchant admin app."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # state
  flutter_riverpod: ^2.6.1
  # networking
  dio: ^5.7.0
  # routing
  go_router: ^14.6.2
  # auth / storage
  flutter_secure_storage: ^9.2.4
  local_auth: ^2.3.0
  # models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  # ui / design
  google_fonts: ^6.2.1
  phosphor_flutter: ^2.1.0
  # voice (on-device, $0) — Jarvis talk-to-your-shop
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.0
  # media
  image_picker: ^1.1.2
  # utils
  intl: ^0.20.2
  collection: ^1.19.0
  firebase_core: ^4.12.1
  firebase_messaging: ^16.4.3
  url_launcher: ^6.3.2
  daily_flutter: ^0.38.0
  permission_handler: ^11.4.0

dependency_overrides:
  # path_provider_android 2.3.x pulls the jni package whose native CMake step is broken on this toolchain; pin the last pre-jni release.
  path_provider_android: 2.2.17

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true
  shaders:
    - shaders/jarvis_orb.frag
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
